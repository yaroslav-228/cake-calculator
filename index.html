<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Калькулятор тортов</title>
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f4f5f7;
            color: #1c1e21;
            padding: 16px;
            min-height: 100vh;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.07);
            margin-bottom: 14px;
        }

        .title {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            color: #007bff;
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #65676b;
            margin-bottom: 6px;
            margin-top: 14px;
        }
        label:first-of-type { margin-top: 0; }

        select, input[type="number"] {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #dde1e7;
            border-radius: 10px;
            font-size: 15px;
            background: #fafbfc;
            appearance: none;
            outline: none;
            transition: border-color .2s;
        }
        select:focus, input[type="number"]:focus {
            border-color: #007bff;
            background: #fff;
        }

        /* Ползунок веса */
        .weight-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 4px;
        }
        input[type="range"] {
            flex: 1;
            accent-color: #007bff;
            height: 4px;
        }
        .weight-value {
            min-width: 52px;
            text-align: right;
            font-size: 16px;
            font-weight: 700;
            color: #007bff;
        }

        .result-box {
            background: linear-gradient(135deg, #e8f0fe 0%, #dbeafe 100%);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            margin-top: 18px;
        }
        .result-label {
            font-size: 13px;
            color: #5f8ee8;
            margin-bottom: 4px;
        }
        .result-price {
            font-size: 28px;
            font-weight: 800;
            color: #1a73e8;
        }
        .result-detail {
            font-size: 13px;
            color: #5f8ee8;
            margin-top: 4px;
        }
        .result-nodecor {
            font-size: 11px;
            color: #9ab0e8;
            margin-top: 8px;
            font-style: italic;
        }

        .btn {
            width: 100%;
            background: #007bff;
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 16px;
            transition: background .2s, transform .1s;
            letter-spacing: .3px;
        }
        .btn:active { background: #0056b3; transform: scale(.98); }

        .hint {
            font-size: 12px;
            color: #9aa0ab;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="title">🎂 Калькулятор тортов</div>

    <!-- Формат -->
    <label>Формат торта</label>
    <select id="format" onchange="onFormatChange()">
        <option value="standard">Одноярусный (стандарт)</option>
        <option value="multi">Многоярусный</option>
        <option value="antigravity">Антигравитация</option>
    </select>

    <!-- Начинка (только для стандарта) -->
    <div id="flavor-wrap">
        <label>Начинка</label>
        <select id="flavor" onchange="calculate()">
            <option value="2400">Шоколадный с клубничной начинкой — 2 400 ₽/кг</option>
            <option value="2600">Морковный с грецким орехом и корицей (апельсин, персик) — 2 600 ₽/кг</option>
            <option value="2400">Ванильный с манго-маракуйей — 2 400 ₽/кг</option>
            <option value="2400">Ванильный с клубничной начинкой — 2 400 ₽/кг</option>
            <option value="2600">Сникерс — 2 600 ₽/кг</option>
            <option value="2600">Рафаэлло с кокосовой стружкой — 2 600 ₽/кг</option>
            <option value="2400">Клубнично-маковый — 2 400 ₽/кг</option>
            <option value="2400">Фисташковый с клубникой — 2 400 ₽/кг</option>
            <option value="2400">Молочная девочка (ванильно-шоколадная) — 2 400 ₽/кг</option>
            <option value="2200">Медовый — 2 200 ₽/кг</option>
        </select>
    </div>

    <!-- Вес -->
    <label>Вес торта: <span id="weight-label">2,0 кг</span></label>
    <div class="weight-row">
        <input type="range" id="weight-range" min="2" max="20" step="0.5" value="2"
               oninput="onWeightChange(this.value)">
        <div class="weight-value" id="weight-display">2,0 кг</div>
    </div>

    <!-- Результат -->
    <div class="result-box">
        <div class="result-label">Стоимость от</div>
        <div class="result-price" id="result-price">4 800 ₽</div>
        <div class="result-detail" id="result-detail">2,0 кг × 2 400 ₽/кг</div>
        <div class="result-nodecor">* цена указана без декора</div>
    </div>

    <button class="btn" onclick="submitOrder()">Выбрать этот торт ✅</button>
    <div class="hint">После нажатия заявка уйдёт менеджеру в чат</div>
</div>

<script>
    // ── Состояние ─────────────────────────────────────
    let currentWeight = 2;

    // ── Форматирование числа ──────────────────────────
    function fmt(n) {
        return n.toLocaleString("ru-RU");
    }
    function fmtW(w) {
        return w.toFixed(1).replace(".", ",") + " кг";
    }

    // ── Обновить отображение веса ─────────────────────
    function onWeightChange(val) {
        currentWeight = parseFloat(val);
        document.getElementById("weight-label").textContent  = fmtW(currentWeight);
        document.getElementById("weight-display").textContent = fmtW(currentWeight);
        calculate();
    }

    // ── Переключение формата ──────────────────────────
    function onFormatChange() {
        const fmt_ = document.getElementById("format").value;
        document.getElementById("flavor-wrap").style.display =
            fmt_ === "standard" ? "block" : "none";
        calculate();
    }

    // ── Расчёт ───────────────────────────────────────
    function calculate() {
        const format = document.getElementById("format").value;
        const weight = currentWeight;

        let pricePerKg, flavorName;

        if (format === "standard") {
            const sel = document.getElementById("flavor");
            pricePerKg = parseFloat(sel.value);
            // Достаём название без цены (текст до " —")
            flavorName = sel.options[sel.selectedIndex].text.split(" —")[0].trim();
        } else {
            pricePerKg = 2800;
            flavorName = format === "multi" ? "Многоярусный" : "Антигравитация";
        }

        const total = Math.round(pricePerKg * weight);

        document.getElementById("result-price").textContent  = fmt(total) + " ₽";
        document.getElementById("result-detail").textContent =
            `${fmtW(weight)} × ${fmt(pricePerKg)} ₽/кг`;

        return { format, flavorName, weight, pricePerKg, total };
    }

    // ── Отправка заявки ───────────────────────────────
    function submitOrder() {
        const order = calculate();
        const payload = JSON.stringify(order);

        if (window.WebApp) {
            try {
                const raw = window.WebApp.initDataManager && window.WebApp.initDataManager.rawInitData || "";
                const params = new URLSearchParams(raw);
                const queryId = params.get("query_id");

                // Пробуем все варианты по очереди и показываем что вышло
                let result = "query_id=" + queryId + "\n";

                if (queryId) {
                    window.WebApp.withQueryId(queryId, payload);
                    result += "вызван withQueryId";
                } else {
                    window.WebApp.transport.sendEvent("web_app_data_send", { data: payload });
                    result += "вызван sendEvent";
                }
                alert("Отправлено! " + result);
                return;
            } catch(e) {
                alert("Ошибка: " + e.message);
            }
        }

        // Fallback для теста в браузере
        alert(
            `✅ Расчёт готов!\n` +
            `Формат: ${order.flavorName}\n` +
            `Вес: ${order.weight} кг\n` +
            `Сумма: ${order.total.toLocaleString("ru-RU")} ₽`
        );
    }

    // ── Инициализация ─────────────────────────────────
    if (window.WebApp) WebApp.ready();
    calculate();
</script>
</body>
</html>
